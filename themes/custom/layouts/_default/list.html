{{ define "main" }}
<div class="container" style="padding-top:2rem">
  <h1 class="page-heading">All Articles</h1>
  <p class="page-sub">{{ .Site.Params.description }}</p>
  <div class="post-grid" style="margin-top:2rem">
    {{ range .Pages }}
    <article class="post-card">
      <div class="card-thumb" style="background: linear-gradient(135deg, var(--card) 0%, var(--main) 100%);">
        {{ range first 1 .Params.tags }}<span class="card-category">{{ . }}</span>{{ end }}
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span>{{ .Date.Format "Jan 2, 2006" }}</span>
          <span>&middot;</span>
          <span>{{ .ReadingTime }} min read</span>
        </div>
        <h3 class="card-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
        <p class="card-desc">{{ .Description | default .Summary | truncate 120 }}</p>
      </div>
      <div class="card-footer">
        <a href="{{ .Permalink }}" class="card-link">Read more &rarr;</a>
      </div>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
